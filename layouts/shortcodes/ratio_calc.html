<div style="background: #161b22; padding: 20px; border-radius: 6px; border: 1px solid #30363d; font-family: monospace; max-width: 400px;">
    <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; color: #c9d1d9;">
        <input type="number" id="a" placeholder="A" style="width: 100%; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 5px;">
        <span>:</span>
        <input type="number" id="b" placeholder="B" style="width: 100%; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 5px;">

        <div style="grid-column: span 3; text-align: center; padding: 5px;">=</div>

        <input type="number" id="c" placeholder="C" style="width: 100%; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 5px;">
        <span>:</span>
        <input type="number" id="d" placeholder="D" style="width: 100%; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 5px;">
    </div>

    <div style="display: grid; grid-template-columns: auto auto; gap: 10px; align-items: center; color: #c9d1d9;">
        <button onclick="calc()" style="margin-top: 20px; width: 100%; background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Solve</button>
        <button onclick="reset()" style="margin-top: 20px; width: 100%; background: #862323; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Reset</button>
    </div>
    <p id="out" style="margin-top: 15px; color: #8b949e; height: 1.2em;"></p>
</div>

<script>
function calc() {
    const v = {
        a: parseFloat(document.getElementById('a').value),
        b: parseFloat(document.getElementById('b').value),
        c: parseFloat(document.getElementById('c').value),
        d: parseFloat(document.getElementById('d').value)
    };
    const out = document.getElementById('out');
    const missing = Object.keys(v).filter(k => isNaN(v[k]));

    if (missing.length !== 1) {
        out.innerText = "Error: Fill exactly 3 fields.";
        out.style.color = "#f85149";
        return;
    }

    const key = missing[0];
    let res = 0;
    if (key === 'a') res = (v.b * v.c) / v.d;
    if (key === 'b') res = (v.a * v.d) / v.c;
    if (key === 'c') res = (v.a * v.d) / v.b;
    if (key === 'd') res = (v.b * v.c) / v.a;

    out.innerText = `> ${key.toUpperCase()} = ${res.toFixed(2)}`;
    out.style.color = "#3fb950";
    document.getElementById(key).value = res.toFixed(2);
}

function reset() {
    document.getElementById('a').value = ""
    document.getElementById('b').value = ""
    document.getElementById('c').value = ""
    document.getElementById('d').value = ""
    document.getElementById('out').innerText = ""
}
</script>
